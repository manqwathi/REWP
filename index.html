<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>REWP Logbook</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json"    type="B">
<script>
  if('serviceWorker' in navigator) {
    navigator.serviceWorker.register('sw.js');
  }
</script>

</head>
<body>

<div id="splash-screen" style="position:fixed; top:0; left:0; width:100%; height:100%; background:radial-gradient(circle, #1a1a1a 0%, #080808 100%); z-index:10000; display:flex; flex-direction:column; align-items:center; justify-content:center; transition: opacity 0.8s ease-in-out;">
    
    <!-- Unified Brand Section -->
    <div style="text-align:center; margin-bottom:40px;">
        <div style="background: rgba(255, 255, 255, 0.03); padding: 25px; border-radius: 24px; border: 1px solid rgba(255, 255, 255, 0.05); display: inline-block; box-shadow: 0 20px 40px rgba(0,0,0,0.4);">
            <img src="icon-512.png" style="width:120px; height:120px; filter: drop-shadow(0 0 10px rgba(0, 255, 136, 0.2)); object-fit: contain;">
        </div>
        <h1 style="color:white; font-family:'Segoe UI', Roboto, sans-serif; font-weight:300; letter-spacing:6px; margin-top:20px; font-size:1.1rem; opacity:0.9;">REWP <span style="color:#00ff88; font-weight:700;">LOGBOOK</span></h1>
    </div>

    <!-- Progress UI -->
    <div style="width:220px; height:3px; background:rgba(255,255,255,0.1); border-radius:10px; overflow:hidden; margin-bottom:12px;">
        <div id="boot-progress" style="width:0%; height:100%; background:linear-gradient(90deg, #00ff88, #00bd68); box-shadow: 0 0 15px rgba(0,255,136,0.5); transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);"></div>
    </div>

    <!-- Status with Processing Phases -->
    <div id="boot-status" style="color:#00ff88; font-family:monospace; font-size:0.65rem; letter-spacing:2px; text-transform:uppercase; min-height:15px;">
        INITIALIZING... 0%
    </div>

    <!-- Hidden by default, appears after 3 seconds if needed -->
    <button id="skip-btn" onclick="skipBoot()" style="margin-top:40px; background:none; border:none; color:#444; font-size:0.6rem; letter-spacing:1px; cursor:pointer; text-decoration:underline; display:none;">SKIP INITIALIZATION</button>
</div>


<div class="container">
    <header><h1>REWP <span class="accent">Logbook</span></h1></header>

    <section class="card">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <label style="margin-bottom:0;">Trip Setting</label>
        <button onclick="openMarketingMap()" class="btn-search" title="Search nearby recycling places">🔍</button>
    </div>
    
    <div class="stack-mobile">
            <input type="number" id="distance" value="200" placeholder="km">
            <input type="number" id="consuption" value="8.0" placeholder="L/100km">
            <input type="number" id="fuelPrice" value="20.12" placeholder="R/L">
        </div>
    </section>

    <section class="card">
        <label>Inventory Log</label>
        <select id="matType">
            <option value="150">Cellphone Boards (R150)</option>
            <option value="120">RAM Sticks (R120)</option>
            <option value="95">Bronze (R95)</option>
            <option value="18">Stainless Steel (R18)</option>
            <option value="4.50">Subgrade Sheets (R4.50)</option>
            <option value="135">Copper Mix (R135.00)</option>
            <optgroup label="Heavy Metals & Batteries">
    <option value="12">Lead (R12/kg)</option>
    <option value="10.50">Car Batteries (R10.50/kg)</option>
    <option value="85">Brass (R85/kg)</option>
</optgroup>

        </select>
        <div class="input-row">
            <input type="number" id="weight" placeholder="kg">
            <button onclick="addItem()" class="btn-main">Add (Enter)</button>
        </div>
    </section>
<!-- Inside the <div class="container"> -->
<section class="card summary">
    <div class="stat-row"><span>Gross Revenue</span> <span id="gross">R0.00</span></div>
    <div class="stat-row" style="color:var(--danger)"><span>Fuel Cost</span> <span id="travel">R0.00</span></div>
    <div class="net-profit">NET: <span id="netProfit">R0.00</span></div>
    
    <!-- This is the Export CSV button -->
    <button onclick="exportToCSV()" class="btn-alt" style="margin-top:15px; width:100%;">Export CSV</button>
</section>

<!-- ADD THE FEED HERE (Below Export CSV, Inside Container) -->
<section class="market-analysis-feed">
    <div class="feed-container">
        <div class="market-card">
            <h4>Copper</h4>
            <span class="price-up">↑ R135.50</span>
            <small>Local Average</small>
        </div>
        <div class="market-card">
            <h4>Aluminum</h4>
            <span class="price-down">↓ R12.00</span>
            <small>Down</small>
        </div>
        <div class="market-card">
            <h4>Steel</h4>
            <span class="price-stable">→ R5.50</span>
            <small>Stable</small>
        </div>
    </div>
</section>
<!-- End of .container -->
<!-- Reminder / Notifier Pop-up -->
<div id="reminderPopup" class="wallet-overlay">
    <div class="wallet-content">
        <h3>🔔 Alert Settings</h3>
        <input type="number" id="targetInput" placeholder="Set Profit Target (R)">
        
        <div style="margin: 15px 0; display: flex; gap: 10px;">
            <button onclick="saveReminder()" class="btn-main">Save Target</button>
            <!-- Flash Test Button -->
            <button onclick="testAlert()" class="btn-alt" style="background:#444;">Test Flash</button>
        </div>
        
        <button onclick="toggleReminder()" class="btn-hide">Close</button>
    </div>
</div>


<div id="walletPopup" class="wallet-overlay">
    <div class="wallet-content">
        <div class="market-header">
            <div style="display:flex; justify-content:space-between; align-items:center;">
                <small>REWP WALLET</small>
                <span id="totalWeight" class="weight-badge">0 kg Total Load</span>
            </div>
            <div id="marketWatch"></div>
        </div>

        <h3>Trip Progress</h3>
        <div class="goal-container">
            <div id="goalText" style="font-size:0.8rem; margin-bottom:5px;">0% Covered</div>
            <div class="goal-bg"><div id="goalFill" class="goal-fill"></div></div>
        </div>

        <!-- History stays in the middle -->
        <div id="historyList" class="history-scroll"></div>

        <!-- Buttons stay at the very bottom -->
        <div class="wallet-actions" style="margin-top:auto;">
            <button onclick="clearHistory()" class="btn-danger">Clear All History</button>
            <button onclick="toggleWallet()" class="btn-hide">Hide Wallet</button>
        </div>
    </div>
</div>

<button class="fab" onclick="toggleWallet()">💰</button>

<script src="tracker.js"    defer></script>
<script src="exporter.js"    defer></script>
<script src="dropper.js"    defer></script>
<script src="marketer.js" defer></script>
</body>
</html>
